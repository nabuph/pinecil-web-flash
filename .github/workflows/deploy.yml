name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # For a project page (username.github.io/repo-name), set this to /repo-name.
          # For a user/org page (username.github.io), remove this line.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Hide the demo (mock device) buttons on the live site.
          # Local `npm run dev` and `npm run build` keep them.
          NEXT_PUBLIC_DISABLE_DEMO: "true"
          # Authenticate the IronOS release bundler against the GitHub API so
          # we don't share the 60-req/hour unauthenticated limit with every
          # other project on the runner. With the workflow's read-only
          # permission on contents this token has no extra power; it just
          # bumps the rate limit to 5,000 req/hour.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
